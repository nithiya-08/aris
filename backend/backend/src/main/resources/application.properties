# =============================================
# APPLICATION NAME
# =============================================
spring.application.name=skillbridge

# =============================================
# MySQL Database Configuration (Production)
# =============================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Server Configuration
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# CORS Configuration
# =============================================
cors.allowedOrigins=http://localhost:8000,http://localhost:3000,http://localhost:5500,https://your-project.vercel.app
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowedHeaders=*
cors.allowCredentials=true

# =============================================
# Logging
# =============================================
logging.level.org.springframework=INFO
logging.level.com.skillbridge=DEBUG