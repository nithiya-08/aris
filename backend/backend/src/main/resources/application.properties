# H2 Database Configuration (for testing/development)
spring.datasource.url=jdbc:h2:mem:skillbridge
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true

# CORS Configuration
cors.allowedOrigins=http://localhost:8000,http://localhost:3000,http://localhost:5500,http://127.0.0.1:8000,http://127.0.0.1:3000,http://127.0.0.1:5500
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowedHeaders=*
cors.allowCredentials=true

# Server
server.port=8080
server.servlet.context-path=/api
